---
tailscale_host_package_name: tailscale
tailscale_host_apt_key_url: "https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_facts['distribution_release'] }}.noarmor.gpg"
tailscale_host_apt_key_path: /usr/share/keyrings/tailscale-archive-keyring.gpg
tailscale_host_apt_repo_url: https://pkgs.tailscale.com/stable/ubuntu
tailscale_host_authkey_src: "{{ playbook_dir }}/../.secrets/tailscale-host-authkey"
tailscale_host_hostname: "{{ inventory_hostname }}"
tailscale_host_accept_dns: false
tailscale_host_enable_ssh: false
