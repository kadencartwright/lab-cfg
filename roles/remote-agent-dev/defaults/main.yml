---
remote_agent_dev_user: agent
remote_agent_dev_user_home: "/home/{{ remote_agent_dev_user }}"
remote_agent_dev_user_shell: /bin/bash
remote_agent_dev_code_dir: "{{ remote_agent_dev_user_home }}/code"
remote_agent_dev_codex_dir: "{{ remote_agent_dev_user_home }}/.codex"
remote_agent_dev_codex_config_path: "{{ remote_agent_dev_codex_dir }}/config.toml"
remote_agent_dev_codex_config:
  approvals_reviewer: user
  approval_policy: never
  sandbox_mode: danger-full-access
remote_agent_dev_sudoers_path: "/etc/sudoers.d/{{ remote_agent_dev_user }}"
remote_agent_dev_authorized_keys_source_user: lab
remote_agent_dev_create_hushlogin: true
remote_agent_dev_github_cli_package: gh
remote_agent_dev_github_user: kadencartwright
remote_agent_dev_key_sync_packages:
  - curl
remote_agent_dev_key_sync_script_path: /usr/local/sbin/sync-agent-github-keys
remote_agent_dev_key_sync_service_name: sync-agent-github-keys.service
remote_agent_dev_key_sync_timer_name: sync-agent-github-keys.timer
remote_agent_dev_key_sync_interval: 5min
