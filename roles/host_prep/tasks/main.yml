---
- name: Require Debian-family hosts
  ansible.builtin.assert:
    that:
      - ansible_facts["os_family"] == "Debian"
    fail_msg: "This host prep role currently targets Ubuntu/Debian-family systems."

- name: Set hostname from inventory
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
  when: host_prep_manage_hostname

- name: Install host packages
  ansible.builtin.apt:
    name: "{{ host_prep_base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure configured kernel command-line args are present
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail

      file=/etc/default/grub
      arg="${KERNEL_ARG}"

      current="$(sed -n 's/^GRUB_CMDLINE_LINUX="\([^"]*\)".*/\1/p' "$file" | tail -n 1)"
      for token in $current; do
        if [[ "$token" == "$arg" ]]; then
          exit 0
        fi
      done

      tmp="$(mktemp)"
      awk -v arg="$arg" '
        BEGIN { updated = 0 }
        /^GRUB_CMDLINE_LINUX="/ && updated == 0 {
          if ($0 ~ /^GRUB_CMDLINE_LINUX=""/) {
            sub(/"$/, arg "\"")
          } else {
            sub(/"$/, " " arg "\"")
          }
          updated = 1
        }
        { print }
        END {
          if (updated == 0) {
            print "GRUB_CMDLINE_LINUX=\"" arg "\""
          }
        }
      ' "$file" > "$tmp"
      cat "$tmp" > "$file"
      rm -f "$tmp"
      echo changed
  args:
    executable: /bin/bash
  environment:
    KERNEL_ARG: "{{ item }}"
  loop: "{{ host_prep_kernel_cmdline_args }}"
  register: host_prep_kernel_cmdline_result
  changed_when: "'changed' in host_prep_kernel_cmdline_result.stdout"
  notify: Update grub

- name: Enable time sync
  ansible.builtin.service:
    name: chrony
    enabled: true
    state: started

- name: Enable iSCSI daemon for future Longhorn use
  ansible.builtin.service:
    name: iscsid
    enabled: true
    state: started

- name: Load kernel modules now
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ host_prep_kernel_modules }}"

- name: Persist kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/kubernetes.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      {% for module in host_prep_kernel_modules %}
      {{ module }}
      {% endfor %}

- name: Apply Kubernetes sysctl settings
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-kubernetes.conf
  loop: "{{ host_prep_sysctl | dict2items }}"

- name: Disable active swap
  ansible.builtin.command: swapoff -a
  changed_when: true
  when:
    - host_prep_disable_swap
    - ansible_facts["swaptotal_mb"] | int > 0

- name: Comment swap entries in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#]\S+\s+\S+\s+swap\s+\S+.*)$'
    replace: '# \1'
  when: host_prep_disable_swap

- name: Look up login user
  ansible.builtin.getent:
    database: passwd
    key: "{{ host_prep_login_user }}"
  when:
    - host_prep_create_hushlogin or (host_prep_remove_bashrc_lines | length > 0)

- name: Create hushlogin for quiet SSH logins
  ansible.builtin.file:
    path: "{{ ansible_facts.getent_passwd[host_prep_login_user][4] }}/.hushlogin"
    state: touch
    owner: "{{ host_prep_login_user }}"
    group: "{{ ansible_facts.getent_passwd[host_prep_login_user][2] }}"
    mode: "0644"
    modification_time: preserve
    access_time: preserve
  when: host_prep_create_hushlogin

- name: Remove stale shell startup lines
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts.getent_passwd[host_prep_login_user][4] }}/.bashrc"
    regexp: "{{ item }}"
    state: absent
  loop: "{{ host_prep_remove_bashrc_lines }}"
  when: host_prep_remove_bashrc_lines | length > 0

- name: Disable sleep targets
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: true
  loop:
    - sleep.target
    - suspend.target
    - hibernate.target
    - hybrid-sleep.target
  when: host_prep_disable_sleep
