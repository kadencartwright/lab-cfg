---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 30m0s
  timeout: 15m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: forgejo
      version: 17.1.0
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: forgejo
      interval: 12h0m0s
  values:
    replicaCount: 1

    persistence:
      enabled: true
      storageClass: local-path
      size: 20Gi

    service:
      http:
        type: ClusterIP
      ssh:
        type: ClusterIP

    ingress:
      enabled: true
      className: tailscale
      hosts:
        - host: forgejo
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - forgejo

    gitea:
      admin:
        existingSecret: forgejo-admin
        passwordMode: initialOnlyNoReset
      config:
        database:
          DB_TYPE: postgres
          HOST: forgejo-db-rw:5432
          NAME: forgejo
          USER: forgejo
        server:
          ROOT_URL: https://forgejo.bleak-banana.ts.net/
          DOMAIN: forgejo.bleak-banana.ts.net
          SSH_DOMAIN: forgejo.bleak-banana.ts.net
        metrics:
          ENABLED: true
      additionalConfigFromEnvs:
        - name: FORGEJO__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-db-app
              key: password
