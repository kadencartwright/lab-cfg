---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: baby-monitor-edge
  namespace: baby-monitor
  labels:
    app.kubernetes.io/name: baby-monitor-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: baby-monitor-edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: baby-monitor-edge
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.29.3-alpine
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: config
          configMap:
            name: baby-monitor-edge-nginx
