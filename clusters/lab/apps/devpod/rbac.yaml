---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devpod
  namespace: devpod
---
apiVersion: v1
kind: Secret
metadata:
  name: devpod-token
  namespace: devpod
  annotations:
    kubernetes.io/service-account.name: devpod
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devpod-workspaces
  namespace: devpod
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - events
      - persistentvolumeclaims
      - pods
      - pods/attach
      - pods/exec
      - pods/log
      - secrets
      - services
      - serviceaccounts
    verbs:
      - create
      - delete
      - deletecollection
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
      - statefulsets
    verbs:
      - create
      - delete
      - deletecollection
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - deletecollection
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devpod-workspaces
  namespace: devpod
subjects:
  - kind: ServiceAccount
    name: devpod
    namespace: devpod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: devpod-workspaces
