---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kasm
  namespace: kasm
spec:
  interval: 30m0s
  timeout: 20m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: kasm
      version: 1.1181.0
      sourceRef:
        kind: HelmRepository
        name: kasm
        namespace: kasm
      interval: 12h0m0s
  values:
    deploymentSize: small
    publicAddr: kasm.bleak-banana.ts.net

    certificate:
      secretName: kasm-proxy-tls

    proxyService:
      type: ClusterIP

    components:
      guac:
        enabled: false
      rdpGateway:
        enabled: false
      rdpHttpsGateway:
        enabled: false

    ingress:
      enabled: true
      tls: true
      backendProtocol: http
      ingressClassName: tailscale

    database:
      standalone: true
      hostname: kasm-db-rw
      port: 5432
      kasmDbName: kasm
      kasmDbUser: kasmapp
      kasmDbSecret:
        name: kasm-db-app
        key: password
      postgresMasterUser:
        username: postgres
        secret:
          name: kasm-db-superuser
          key: password

    dbManagement:
      initialize: true
      upgrade:
        enable: false
      backupCron:
        enabled: false
