---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rustfs-api
  namespace: rustfs
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - rustfs
  rules:
    - host: rustfs
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rustfs-svc
                port:
                  number: 9000
