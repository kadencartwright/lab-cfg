---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 30m0s
  chart:
    spec:
      chart: tailscale-operator
      version: 1.98.4
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: tailscale
      interval: 12h0m0s
  values:
    operatorConfig:
      defaultTags:
        - tag:k8s-operator
      hostname: tailscale-operator
    proxyConfig:
      defaultTags: tag:k8s
    apiServerProxyConfig:
      mode: "false"
      allowImpersonation: "false"
